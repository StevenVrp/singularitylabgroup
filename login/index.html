<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Singularity Lab - Authentication</title>
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://www.google.com/recaptcha/api.js?onload=onRecaptchaLoad&render=explicit" async defer></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#EC4899',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .input-focus { @apply focus:border-primary focus:ring-2 focus:ring-primary/20; }
        .btn-hover { @apply hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200; }
        
        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .animate-scroll {
            animation: scroll 40s linear infinite;
            width: max-content;
            will-change: transform;
        }
        
        /* Tab glow effect */
        .tab-glow:hover {
            filter: drop-shadow(0 0 6px rgba(59, 130, 246, 0.5));
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-blue-50 min-h-screen flex items-center justify-center p-4">
    
    <!-- Main Container -->
    <div class="w-full max-w-2xl bg-white rounded-2xl shadow-custom overflow-hidden flex flex-col lg:flex-row min-h-[770px] lg:min-h-[770px]">
        
        <!-- Right Form Panel -->
        <div class="w-full p-8 lg:p-12 flex flex-col justify-start min-h-[770px] lg:min-h-[770px]">
            
            <!-- Tabs -->
            <div class="flex border-b border-gray-100 mb-8">
                <button id="login-tab" class="flex-1 py-3 font-bold text-lg text-primary border-b-2 border-primary tab-glow hover:text-primary transition-colors tab-glow">Login</button>
                <button id="signup-tab" class="flex-1 py-3 font-bold text-lg text-gray-400 hover:text-primary transition-colors tab-glow">Sign Up</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="space-y-5">
                <div class="relative">
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-envelope text-gray-400"></i>
                    </div>
                    <input type="email" id="email" class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl input-focus" placeholder="you@example.com" required>
                </div>
                <div class="relative">
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-gray-400"></i>
                    </div>
                    <input type="password" id="password" class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl input-focus" placeholder="••••••••" required>
                </div>
                <!-- reCAPTCHA -->
                <div class="flex justify-center pt-2">
                    <div id="recaptcha-login" class="g-recaptcha" data-sitekey="6Levr-ksAAAAAH8krNDApNxbGzLLcKiBY7x4Gah-"></div>
                </div>

                <div class="flex items-center justify-between pt-1">
                    <div class="flex items-center">
                        <input type="checkbox" id="remember" class="rounded border-gray-300 text-primary focus:ring-primary">
                        <label for="remember" class="ml-2 text-sm text-gray-600">Remember me</label>
                    </div>
                    <button type="button" onclick="showResetModal()" class="text-sm text-primary hover:underline">Forgot password?</button>
                </div>

                <button type="submit" class="w-full bg-primary text-white font-bold py-3.5 rounded-xl btn-hover flex items-center justify-center mt-2" id="login-btn">
                    <span>Sign In</span>
                    <i class="fas fa-spinner fa-spin hidden ml-2" id="login-spinner"></i>
                </button>
            </form>

            <!-- Sign Up Form -->
            <form id="signup-form" class="space-y-5 hidden">
                <div class="grid grid-cols-2 gap-4">
                    <div class="relative">
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">First Name</label>
                        <input type="text" id="first-name" class="w-full px-4 py-3 border border-gray-200 rounded-xl input-focus" placeholder="John" required>
                    </div>
                    <div class="relative">
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Last Name</label>
                        <input type="text" id="last-name" class="w-full px-4 py-3 border border-gray-200 rounded-xl input-focus" placeholder="Doe" required>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Gender Identity</label>
                    <select id="gender" class="w-full px-4 py-3 border border-gray-200 rounded-xl input-focus" onchange="toggleCustomGender()">
                        <option value="">Prefer not to say</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="others">Others</option>
                    </select>
                    
                    <div id="custom-gender-container" class="hidden mt-4">
                        <input type="text" id="custom-gender" class="w-full px-4 py-3 border border-gray-200 rounded-xl input-focus" placeholder="Please specify your gender">
                    </div>
                </div>
                <div class="relative">
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Email</label>
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-envelope text-gray-400"></i>
                    </div>
                    <input type="email" id="signup-email" class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl input-focus" placeholder="you@example.com" required>
                </div>
                
                <div class="relative">
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-gray-400"></i>
                    </div>
                    <input type="password" id="signup-password" class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl input-focus" placeholder="Min. 6 characters" required>
                </div>
                
                <!-- reCAPTCHA -->
                <div class="flex justify-center pt-2">
                    <div id="recaptcha-signup" class="g-recaptcha" data-sitekey="6Levr-ksAAAAAH8krNDApNxbGzLLcKiBY7x4Gah-"></div>
                </div>

                <div class="flex items-start pt-1">
                    <input type="checkbox" id="terms" class="mt-1 rounded border-gray-300 text-primary focus:ring-primary" required>
                    <label for="terms" class="ml-2 text-sm text-gray-600">
                        I agree to the <a href="legal.html#terms-of-use" class="text-primary hover:underline">Terms</a> and <a href="legal.html#privacy-policy" class="text-primary hover:underline">Privacy Policy</a>.
                    </label>
                </div>
                <button type="submit" class="w-full bg-primary text-white font-bold py-3.5 rounded-xl btn-hover flex items-center justify-center mt-2" id="signup-btn">
                    <span>Create Account</span>
                    <i class="fas fa-spinner fa-spin hidden ml-2" id="signup-spinner"></i>
                </button>
            </form>

            <!-- Status Message -->
            <div id="message" class="mt-6 text-center text-sm hidden p-3 rounded-xl"></div>

            <!-- Premium Filler Content -->
            <div class="mt-12 pt-6 border-t border-gray-100" id="premium-filler">
                <div class="overflow-hidden relative mt-8">
                    <div class="flex animate-scroll space-x-12" id="logo-track">
                        <i class="fab fa-microsoft text-[2.5rem] opacity-70 hover:opacity-100 transition-opacity"></i>
                        <i class="fab fa-google text-[2.5rem] opacity-70 hover:opacity-100 transition-opacity"></i>
                        <i class="fab fa-google-plus-g text-[2.5rem] opacity-70 hover:opacity-100 transition-opacity"></i>
                        <i class="fab fa-google-drive text-[2.5rem] opacity-70 hover:opacity-100 transition-opacity"></i>
                        <i class="fab fa-github text-[2.5rem] opacity-70 hover:opacity-100 transition-opacity"></i>
                        <i class="fa-regular fa-closed-captioning text-[2.5rem] opacity-70 hover:opacity-100 transition-opacity"></i>
                        <i class="fab fa-bilibili text-[2.5rem] opacity-70 hover:opacity-100 transition-opacity"></i>

                        <i class="fab fa-weixin text-[2.5rem] opacity-70 hover:opacity-100 transition-opacity"></i>
                        <i class="fab fa-youtube text-[2.5rem] opacity-70 hover:opacity-100 transition-opacity"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Password Reset Modal -->
    <div id="reset-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full mx-4">
            <h3 class="text-xl font-bold mb-4">Reset Password</h3>
            <p class="text-gray-600 mb-6">Enter your email to receive a reset link.</p>
            <input type="email" id="reset-email" class="w-full px-4 py-3 border border-gray-200 rounded-xl mb-6" placeholder="you@example.com">
            <div class="flex gap-4">
                <button onclick="hideResetModal()" class="flex-1 py-3 border border-gray-200 rounded-xl">Cancel</button>
                <button onclick="sendResetEmail()" class="flex-1 py-3 bg-primary text-white rounded-xl">Send Link</button>
            </div>
        </div>
    </div>

    <script>
        // --- Supabase Initialization ---
        const SUPABASE_URL = 'https://wtfmsmibjktgajegflwp.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_ez5qG1v0pPIuvv7FF4x7ew_YuqM7dDJ';
        
        let loginRecaptchaWidgetId = null;
        let signupRecaptchaWidgetId = null;
        
        document.addEventListener('DOMContentLoaded', function() {
            const track = document.getElementById('logo-track');
            if (track) {
                track.innerHTML += track.innerHTML;
                track.style.animationTimingFunction = 'linear';
            }
        });
        
        let supabaseClient = null;
        if (SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }

        // --- Explicitly Render reCAPTCHA ---
        function onRecaptchaLoad() {
            const loginElement = document.getElementById('recaptcha-login');
            if (loginElement && typeof grecaptcha !== 'undefined') {
                loginRecaptchaWidgetId = grecaptcha.render('recaptcha-login', {
                    'sitekey': '6Levr-ksAAAAAH8krNDApNxbGzLLcKiBY7x4Gah-'
                });
            }
            
            const signupElement = document.getElementById('recaptcha-signup');
            if (signupElement && typeof grecaptcha !== 'undefined') {
                signupRecaptchaWidgetId = grecaptcha.render('recaptcha-signup', {
                    'sitekey': '6Levr-ksAAAAAH8krNDApNxbGzLLcKiBY7x4Gah-'
                });
            }
        }

        // --- DOM Elements ---
        const loginTab = document.getElementById('login-tab');
        const signupTab = document.getElementById('signup-tab');
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');
        const messageDiv = document.getElementById('message');
        const premiumFiller = document.getElementById('premium-filler');

        // Tab handlers
        loginTab.addEventListener('click', () => {
            loginForm.classList.remove('hidden');
            signupForm.classList.add('hidden');
            loginTab.classList.add('text-primary', 'border-b-2', 'border-primary');
            loginTab.classList.remove('text-gray-400');
            premiumFiller.classList.remove('hidden');
            signupTab.classList.remove('text-primary', 'border-b-2', 'border-primary');
            signupTab.classList.add('text-gray-400');
            clearMessage();
        });

        signupTab.addEventListener('click', () => {
            signupForm.classList.remove('hidden');
            loginForm.classList.add('hidden');
            signupTab.classList.add('text-primary', 'border-b-2', 'border-primary');
            signupTab.classList.remove('text-gray-400');
            premiumFiller.classList.add('hidden');
            loginTab.classList.remove('text-primary', 'border-b-2', 'border-primary');
            loginTab.classList.add('text-gray-400');
            clearMessage();
        });

        // --- UI Helpers ---
        function showMessage(text, isError = true) {
            messageDiv.textContent = text;
            messageDiv.className = `mt-6 text-center text-sm p-3 rounded-xl ${isError ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-600'}`;
            messageDiv.classList.remove('hidden');
        }

        function clearMessage() {
            messageDiv.classList.add('hidden');
        }

        // --- Social Login ---
        function loginWithProvider(provider) {
            if (!supabaseClient) return alert("Database not connected.");
            supabaseClient.auth.signInWithOAuth({ provider });
        }

        // --- Password Reset Modal ---
        function showResetModal() {
            document.getElementById('reset-modal').classList.remove('hidden');
            document.getElementById('reset-modal').classList.add('flex');
        }

        function hideResetModal() {
            document.getElementById('reset-modal').classList.add('hidden');
            document.getElementById('reset-modal').classList.remove('flex');
        }
        
        function toggleCustomGender() {
            const genderSelect = document.getElementById('gender');
            const customContainer = document.getElementById('custom-gender-container');
            const customInput = document.getElementById('custom-gender');
            
            if (genderSelect.value === 'others') {
                customContainer.classList.remove('hidden');
                customInput.required = true;
            } else {
                customContainer.classList.add('hidden');
                customInput.required = false;
                customInput.value = '';
            }
        }

        async function sendResetEmail() {
            const email = document.getElementById('reset-email').value;
            if (!email) return alert("Please enter your email.");
            
            const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                redirectTo: `${window.location.origin}/reset-password.html`
            });
            
            if (error) {
                alert(error.message);
            } else {
                alert("Password reset email sent! Check your inbox.");
                hideResetModal();
            }
        }

        // --- Login Logic ---
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const spinner = document.getElementById('login-spinner');
            btn.disabled = true;
            spinner.classList.remove('hidden');
            
            const { error } = await supabaseClient.auth.signInWithPassword({
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            });
            
            btn.disabled = false;
            spinner.classList.add('hidden');
            
            if (error) {
                showMessage(error.message);
            } else {
                showMessage('Login successful! Redirecting...', false);
                setTimeout(() => window.location.href = '/welcome/', 1500); 
            }
        });

        // --- Sign Up Logic (FIXED: Detect existing email properly) ---
        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('signup-btn');
            const spinner = document.getElementById('signup-spinner');
            btn.disabled = true;
            spinner.classList.remove('hidden');

            // reCAPTCHA Check
            if (typeof grecaptcha !== 'undefined') {
                const recaptchaResponse = grecaptcha.getResponse(signupRecaptchaWidgetId);
                if (!recaptchaResponse) {
                    showMessage('Please complete the reCAPTCHA verification.');
                    btn.disabled = false;
                    spinner.classList.add('hidden');
                    return;
                }
            }

            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;

            const { data, error } = await supabaseClient.auth.signUp({
                email: email,
                password: password,
                options: {
                    emailRedirectTo: `${window.location.origin}/welcome/`,
                    data: {
                        first_name: document.getElementById('first-name').value,
                        last_name: document.getElementById('last-name').value,
                        gender: document.getElementById('gender').value
                    }
                }
            });

            btn.disabled = false;
            spinner.classList.add('hidden');
            
            // ✅ FIX: Check if user already exists
            if (data?.user && data.user.identities && data.user.identities.length === 0) {
                showMessage('An account with this email already exists. Please log in.');
                if (typeof grecaptcha !== 'undefined') grecaptcha.reset(signupRecaptchaWidgetId);
                return;
            }

            if (error) {
                showMessage(error.message);
            } else {
                showMessage('Registration successful! Please check your email to confirm.', false);
                if (typeof grecaptcha !== 'undefined') grecaptcha.reset(signupRecaptchaWidgetId);
            }
        });
    </script>
</body>
</html>
