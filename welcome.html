<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Singularity Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    
    <!-- Loading Spinner (Shown while checking authentication) -->
    <div id="loading" class="text-center">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto"></div>
        <p class="mt-4 text-gray-600">Verifying your session...</p>
    </div>

    <!-- Welcome Content (Hidden until authenticated) -->
    <div id="welcome-content" class="hidden text-center p-8 bg-white rounded-2xl shadow-xl max-w-md w-full mx-4">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">Welcome to the Singularity Lab!</h1>
        <p id="user-email" class="text-gray-600 mb-6"></p>
        
        <div class="space-y-4">
            <button onclick="logout()" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 px-6 rounded-xl transition-all">
                Logout
            </button>
        </div>
    </div>

    <script>
        // Initialize Supabase Client
        const SUPABASE_URL = 'https://wtfmsmibjktgajegflwp.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_ez5qG1v0pPIuvv7FF4x7ew_YuqM7dDJ';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Security Check: Verify the user's session on page load
        document.addEventListener('DOMContentLoaded', async () => {
            const { data: { session }, error } = await supabaseClient.auth.getSession();

            if (error || !session) {
                // No valid session found. Redirect immediately to login.
                window.location.href = 'login.html'; 
                return;
            }

            // User is authenticated. Show the welcome content.
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('welcome-content').classList.remove('hidden');
            
            // Display user info securely fetched from the database
            const user = session.user;
            document.getElementById('user-email').textContent = `Logged in as: ${user.email}`;
        });

        // Logout Function
        async function logout() {
            await supabaseClient.auth.signOut();
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
