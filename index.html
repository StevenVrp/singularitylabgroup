<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Singularity Lab is a student-led educational platform providing interactive lesson pathways, guided notes, presentation resources, experiment walkthroughs, and community learning experiences. Explore engaging lessons across science, technology, engineering, and mathematics through downloadable materials, educational videos, and collaborative discussion spaces designed to support independent learning, classroom enrichment, and scientific exploration.">
    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/Images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/Images/favicon-16x16.png">
    <link rel="shortcut icon" href="/Images/favicon.ico">

    <title>Singularity Lab - Initialising</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        singularity: {
                            dark: "#000000",
                            gray: "#1a1a1a",
                            blue: "#2563eb",
                            light: "#f5f5f7"
                        }
                    },
                    fontFamily: {
                        singularity: ['SF Pro Display', 'Helvetica Neue', 'Arial', 'sans-serif']
                    }
                }
            }
        }
    </script>

    <style>

        html,
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: black;
            font-family: 'SF Pro Display', sans-serif;
            width: 100%;
            height: 100%;
        }

        /* =========================
           LOADER
        ========================== */

        #loader {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            background: black;
            overflow: hidden;
        }

        /* =========================
           GRID
        ========================== */

        .grid-bg {
            position: absolute;
            inset: 0;

            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);

            background-size: 50px 50px;

            mask-image: radial-gradient(
                circle at center,
                rgba(255,255,255,1),
                rgba(255,255,255,0.1)
            );

            animation: driftGrid 12s linear infinite;
        }

        @keyframes driftGrid {
            from {
                transform: translateY(0px);
            }

            to {
                transform: translateY(50px);
            }
        }

        /* =========================
           PARTICLES
        ========================== */

        .particle {
            position: absolute;
            border-radius: 999px;
            background: rgba(255,255,255,0.2);
            animation: floatParticle linear infinite;
        }

        @keyframes floatParticle {

            from {
                transform: translateY(0px);
                opacity: 0;
            }

            20% {
                opacity: 1;
            }

            100% {
                transform: translateY(-120vh);
                opacity: 0;
            }
        }

        /* =========================
           LOGO
        ========================== */

        .logo-glow {
            filter:
                drop-shadow(0 0 10px rgba(37,99,235,0.5))
                drop-shadow(0 0 30px rgba(37,99,235,0.3));
        }

        /* =========================
           PROGRESS BAR
        ========================== */

        .progress-container {
            width: 320px;
            height: 3px;
            background: rgba(255,255,255,0.08);
            overflow: hidden;
            border-radius: 999px;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            width: 0%;

            background: linear-gradient(
                90deg,
                #2563eb,
                #60a5fa,
                #93c5fd
            );

            transition: width 0.35s ease;

            box-shadow:
                0 0 20px rgba(37,99,235,0.7);
        }

        /* =========================
           FLICKER
        ========================== */

        .flicker {
            animation: flicker 2s infinite;
        }

        @keyframes flicker {

            0%, 100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

    </style>
</head>

<body>

    <!-- =========================================
         LOADER
    ========================================== -->

    <div id="loader">

        <!-- GRID -->
        <div class="grid-bg"></div>

        <!-- PARTICLES -->
        <div id="particles"></div>

        <!-- CONTENT -->
        <div class="relative z-10 text-center px-6">

            <!-- LOGO -->
            <img
                src="/Images/Logo1.png"
                alt="Singularity Lab"
                class="w-32 mx-auto mb-10 logo-glow animate-pulse"
            >

            <!-- TITLE -->
            <h1 class="text-white text-6xl md:text-7xl font-black italic tracking-tight">
                Singularity
            </h1>

            <!-- STATUS -->
            <div
                id="status-text"
                class="mt-5 text-sm uppercase tracking-[0.35em] text-blue-400 flicker"
            >
                Initializing Discovery Engine
            </div>

            <!-- PROGRESS -->
            <div class="mt-10 progress-container mx-auto">

                <div
                    id="progress-bar"
                    class="progress-bar">
                </div>

            </div>

            <!-- PERCENT -->
            <div
                id="progress-percent"
                class="mt-4 text-gray-500 text-sm tracking-widest"
            >
                0%
            </div>

        </div>

    </div>

    <script>

        /* =========================================
           PARTICLES
        ========================================== */

        const particleContainer =
            document.getElementById('particles');

        for (let i = 0; i < 40; i++) {

            const particle =
                document.createElement('div');

            particle.classList.add('particle');

            const size =
                Math.random() * 4 + 1;

            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;

            particle.style.left =
                `${Math.random() * 100}%`;

            particle.style.bottom = `-20px`;

            particle.style.animationDuration =
                `${Math.random() * 15 + 8}s`;

            particle.style.animationDelay =
                `${Math.random() * 8}s`;

            particleContainer.appendChild(particle);
        }

        /* =========================================
           STATUS ROTATION
        ========================================== */

        const statuses = [

            "Initializing Discovery Engine",
            "Synchronizing Neural Systems",
            "Rendering Molecular Structures",
            "Analyzing Scientific Data",
            "Preparing Laboratory Interface",
            "Loading Educational Modules",
            "Establishing Quantum Link",
            "Finalizing Visual Pipeline"

        ];

        let statusIndex = 0;

        setInterval(() => {

            statusIndex++;

            document.getElementById('status-text').innerText =
                statuses[statusIndex % statuses.length];

        }, 1800);

        /* =========================================
           ASSETS
        ========================================== */

        const assets = [

            // HERO VIDEO
            "/Images/Hero.mov",

            // LOGOS
            "/Images/Logo1.png",
            "/Images/Logo2.png",
            "/Images/StevenVrp.png",
            "/Images/StevenWorld.png",

            // LESSONS
            "/Images/L1.png"

        ];

        let loadedAssets = 0;

        const progressBar =
            document.getElementById('progress-bar');

        const progressPercent =
            document.getElementById('progress-percent');

        /* =========================================
           UPDATE PROGRESS
        ========================================== */

        function updateProgress() {

            loadedAssets++;

            const progress =
                Math.floor(
                    (loadedAssets / assets.length) * 100
                );

            progressBar.style.width =
                `${progress}%`;

            progressPercent.innerText =
                `${progress}%`;

            /* =====================================
               FINISHED
            ====================================== */

            if (progress >= 100) {

                setTimeout(() => {

                    /*
                    REDIRECT TO REAL HOME PAGE
                    */

                    const params =
                        new URLSearchParams(window.location.search);
                    
                    const redirectTarget =
                        params.get('redirect') || '/home/';
                    
                    window.location.href = redirectTarget;

                }, 1200);
            }
        }

        /* =========================================
           IMAGE PRELOAD
        ========================================== */

        function preloadImage(src) {

            return new Promise((resolve, reject) => {

                const img = new Image();

                img.onload = () => resolve(src);

                img.onerror = () => reject(src);

                img.src = src;
            });
        }

        /* =========================================
           VIDEO PRELOAD
        ========================================== */

        function preloadVideo(src) {

            return new Promise((resolve, reject) => {

                const video =
                    document.createElement('video');

                video.src = src;

                video.preload = "auto";

                video.muted = true;

                video.oncanplaythrough = () =>
                    resolve(src);

                video.onerror = () =>
                    reject(src);

                video.load();
            });
        }

        /* =========================================
           MAIN PRELOAD
        ========================================== */

        async function preloadAssets() {

            const promises = assets.map(src => {

                const isVideo =
                    src.endsWith(".mp4")
                    || src.endsWith(".mov")
                    || src.endsWith(".webm");

                if (isVideo) {

                    return preloadVideo(src)
                        .then(updateProgress)
                        .catch(updateProgress);
                }

                return preloadImage(src)
                    .then(updateProgress)
                    .catch(updateProgress);

            });

            await Promise.all(promises);
        }

        preloadAssets();

        /* =========================================
           FAILSAFE
        ========================================== */

        setTimeout(() => {

            const params =
                new URLSearchParams(window.location.search);
            
            const redirectTarget =
                params.get('redirect') || '/home/';
            
            window.location.href = redirectTarget;

        }, 1200000);

    </script>

</body>
</html>
